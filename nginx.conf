server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 版本化文件(flutter_bootstrap.v<ts>.js / main.dart.v<ts>.js)—— 文件名每次
    # 部署唯一(deploy-frontend.sh 打的时间戳),内容不可能变 → 永久 immutable 缓存。
    # index.html(no-store)每次拉新引用新文件名,天然 cache-busting;回访零重下
    # (此前 no-store 让 1.26MB 主包每次打开都重下 = 首屏慢的主因)。必须排在下方
    # 通用 .js 规则之前(nginx regex location 先匹配先生效)。
    location ~* \.v[0-9]+\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
    }

    # 其余 .js(deferred part 文件 main.dart.js_N.part.js / 未带版本号的)+ json —
    # 名字稳定但内容随部署变。用 no-cache(允许缓存但每次校验 ETag,未变则 304 省流量,
    # 变了则取新版),不再用 no-store(避免每次全量重下),仍杜绝旧 part 混入。
    location ~* ^/.*\.(js|json)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /build_version.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # 其他静态资源(图片 / 字体 / canvaskit / assets/*) — 内容稳定,可以长缓存
    location ~* \.(css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
