server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flutter 入口文件 + 所有 .js (含 deferred part 文件 main.dart.js_N.part.js) —
    # 每次部署内容会变,CF / 浏览器都不能长缓存。否则 deferred loading 加载的旧 part
    # 会导致用户看到旧页面(典型症状:首页/profile 是新版但 leaderboard/deposit 是旧版)。
    location ~* ^/.*\.(js|json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
    location = /build_version.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # 其他静态资源(图片 / 字体 / canvaskit / assets/*) — 内容稳定,可以长缓存
    location ~* \.(css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
