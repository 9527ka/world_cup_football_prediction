server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flutter 入口文件 — 每次部署内容会变,CF / 浏览器都不能长缓存
    # (这些文件名没带 hash,只能靠 no-cache 强制每次重新校验 ETag)。
    location ~* ^/(index\.html|main\.dart(\.v\d+)?\.js|flutter_bootstrap(\.v\d+)?\.js|flutter\.js|flutter_service_worker\.js|version\.json|live_overlay\.js|build_version\.txt)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # 其他静态资源(图片 / 字体 / canvaskit / assets/*) — 内容稳定,可以长缓存
    location ~* \.(css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
