name: telegram_cup
description: Telegram WebApp World Cup prediction front-end (Flutter Web)
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  country_flags: ^3.2.0
  flutter_svg: ^2.0.10
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/team_logos/
    - assets/icons/
